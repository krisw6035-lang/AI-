# ========================================
# 生产环境配置（敏感信息一律走环境变量）
# ========================================

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/house_magic_space?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

# CORS 配置（生产环境必须指定具体域名，多个域名用逗号分隔）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# DashScope AI 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  model: qwen-image-edit-plus
  connect-timeout: 10000
  read-timeout: 120000

# 文件存储（生产环境建议 OSS）
file:
  storage:
    type: ${FILE_STORAGE_TYPE:oss}
    local-path: upload
    max-size-mb: 10
    allowed-formats: jpg,jpeg,png,webp
    oss-endpoint: ${OSS_ENDPOINT:}
    oss-access-key-id: ${OSS_ACCESS_KEY_ID:}
    oss-access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    oss-bucket-name: ${OSS_BUCKET_NAME:}

# 微信小程序配置
wx:
  app-id: ${WX_APP_ID:}
  app-secret: ${WX_APP_SECRET:}
  dev-mode: false

# 积分配置
points:
  register-gift: 100
  generate-cost: 10

# 生产日志
logging:
  level:
    root: WARN
    com.xinzhuang.magicspace: INFO
