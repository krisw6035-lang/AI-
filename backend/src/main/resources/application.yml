# ========================================
# 房子魔法空间 · 新装 — 主配置文件
# ========================================

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: magic-space

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# 服务器端口
server:
  port: ${SERVER_PORT:8080}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.xinzhuang.magicspace.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# DashScope AI 模型配置（默认 qwen-image-edit-plus 图生图）
dashscope:
  model: qwen-image-edit-plus

# Sa-Token
sa-token:
  token-name: satoken
  timeout: 604800          # 7 天
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

# 日志
logging:
  level:
    root: INFO
    com.xinzhuang.magicspace: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
